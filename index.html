<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubic Formula</title>
  <script type="module" src="./src/main.ts"></script>
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
  <div>
    <h1 class="page-title">Cubic Solver</h1>

        <!-- input section -->
    <div class="input-row">
      <div class="input-group">
        <h2 class="input-title">a-value:</h2>
        <input type="number" id="a-value" step="any" value="0" />
      </div>

      <div class="input-group">
        <h2 class="input-title">b-value:</h2>
        <input type="number" id="b-value" step="any" value="0" />
      </div>

      <div class="input-group">
        <h2 class="input-title">c-value:</h2>
        <input type="number" id="c-value" step="any" value="0" />
      </div>

      <div class="input-group">
        <h2 class="input-title">d-value:</h2>
        <input type="number" id="d-value" step="any" value="0" />
      </div>

      <button id="solve-button">Solve Cubic</button>
    </div>

    <!-- output section -->
    <div class="equation-display" id="equation-display">
      <h2 id="equation-text">0x³ + 0x² + 0x + 0 = 0</h2>
    </div>

    <div class="content-row">

      <div class="result-box">
        <div class="result-row">
          <h3 class="result-title">p</h3>
          <h3 id="p-value"></h3>
        </div>

        <div class="result-row">
          <h3 class="result-title">q</h3>
          <h3 id="q-value"></h3>
        </div>

        <div class="result-row">
          <h3 class="result-title">Discriminant</h3>
          <h3 id="disc-value"></h3>
        </div>

        <div class="result-row values-row">   <!--2 classes to provide colour to this row-->
          <h3 class="result-title">Values</h3>
          <h3 class="values-header">
            <span>x</span>
            <span>y</span>
          </h3>
        </div>

        <div class="result-row">
          <h3 class="result-title">Root 1</h3>
          <h3 id="root1-value" class="value-display"></h3>
        </div>

        <div class="result-row">
          <h3 class="result-title">Root 2</h3>
          <h3 id="root2-value" class="value-display"></h3>
        </div>

        <div class="result-row">
          <h3 class="result-title">Root 3</h3>
          <h3 id="root3-value" class="value-display"></h3>
        </div>
      </div>

        <canvas id="graph" width="600" height="400"></canvas>

    </div>
</body>

</html>
